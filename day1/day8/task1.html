<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        let userInput=Number(prompt("enter the number:--"));
        let midValue=parseInt(userInput/2);

        let sum=0;
        for(let i=1; i<=midValue; i++){
            if(userInput%i==0){
                sum+=i;  
            }
        }
        if(sum==userInput){
            console.log(userInput,sum,"is a perfect number");
        }else{
            console.log(userInput,sum,"is not a perfect number");
        }
    </script>
</body>
</html>
