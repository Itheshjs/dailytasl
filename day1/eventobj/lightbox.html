    <style>
        *{
            font-family: sans-serif;
            padding: 0px;
            margin: 0px;

        }
        #productSection{
            width: 100%;
            padding: 50px 0px;
        }
        .main{
            width: 1320px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 20px;
        }
        #productSection h1{
            text-align: center;
            font-size: 30px;
            padding: 20px 0px;
        }

        .productItems img{
            width: 100%;
            height: 200px;
        }

        .modelElement{
            position: fixed;
            display: none;
            width: 100%;
            height: 100%;
            background-color: rgb(0, 0,0,0.5);
        }

        .whiteModel{
            width: 800px;
            height: 500px;
            position: fixed;
            left: 50%;
            top: 50%;
            background: white;
            transform: translate(-50%);

        }
        .whiteModel img{
            width: 100%;
        }

        .whiteModel  span{
            position: absolute;
            right: 0px;
            font-size: 40px;
        }

        .showModel{
            display: block;
        }
    </style>

<script>

    let modelElementDiv=document.querySelector(".modelElement")
    let mainElement=document.querySelector(".main")
    let modelImg=document.querySelector(".whiteModel img")


    let closebtn=document.querySelector(".whiteModel span")

    mainElement.addEventListener("click",(e)=>{
        if(e.target.tagName=="IMG"){
            let clickImagePath = e.target.src

            modelElementDiv.classList.add('showModel')

            modelImg.src=clickImagePath
        }

    })

    closebtn.addEventListener("click",()=>{
        
        modelElementDiv.classList.remove('showModel')

        modelImg.src=""
    })
</script>
