<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>


        *{
            margin: 0px;
            padding: 0px;
            font-family: sans-serif;
        }

        .formSection{
            display: grid;
            grid-template-columns: 20% auto;
            width: 300px;
            height: 500px;
            gap: 30px;
            margin-left: 20px;
        }
        .formSection form{
            box-shadow: 0px 0px 10px 2px #ccc;
            width: 500px;
            padding: 20px;
        }
        .formSection h3{
            text-align: center;
            padding: 20px;
        }

        .inputouter{
            margin-bottom: 20px;
        }

        .inputouter label{
            display: block;
            font-size: 14px;
        }
        .inputouter input{
            width: 100%;
            height: 30px;
        }

        table {
    width: 100%;
    border-collapse: collapse;
    font-family: Arial, sans-serif;
    margin: 20px 0;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    border-radius: 8px;
    overflow: hidden;
}

/* Header */
thead {
    background-color: #4CAF50;
    color: white;
}

thead th {
    padding: 12px;
    text-align: left;
    font-size: 16px;
}

/* Body rows */
tbody tr {
    background-color: #f9f9f9;
    transition: background 0.3s;
}

tbody tr:nth-child(even) {
    background-color: #f1f1f1;
}

tbody tr:hover {
    background-color: #e0f7e9;
}

/* Cells */
tbody th {
    padding: 12px;
    text-align: left;
    font-weight: normal;
    border-bottom: 1px solid #ddd;
}

/* Button */
button {
    padding: 6px 12px;
    background-color: #ff4d4d;
    border: none;
    color: white;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #cc0000;
}

    </style>
</head>
<body>
    <section class="formSection">
        <form action="">
            <h3>Enquire Now</h3>

            <div class="inputouter">
                <label for="">Name</label>
                <input type="text" name="userName" id="">
            </div>

            <div class="inputouter">
                <label for="">Emaile</label>
                <input type="email" name="userEmail" id="">
            </div>

            <div class="inputouter">
                <label for="">Phone</label>
                <input type="text" name="userPhone" id="">
            </div>

            <button>Save</button>
        </form>
        <div>
           
        </div>
    </section>

            <table>
                <thead>
                    <tr>
                        <th>Sr.No</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">

                </tbody>
            </table>
</body>

<script>
    let formElement=document.querySelector(".formSection form")

    let userData=[]
    console.log(formElement);

    formElement.addEventListener("submit",(event)=>{
        console.log(event.target)

        let userName=event.target.userName.value;
        let userEmail=event.target.userEmail.value;
        let userPhone=event.target.userPhone.value;
        console.log(userName,userEmail,userPhone)

        let userobject={
            userName,
            userEmail,
            userPhone
        }

        let cheakMyEmail=userData.find((item)=>item.userEmail==userEmail)

        if(cheakMyEmail){
            alert("email alredy exist")
        }
        else{
            userData.push(userobject)
            storeDataintable()
        }
        console.log(userData)

        userData.push(userobject)

        event.target.reset()


        event.preventDefault() // this prevent the page refresh //aslo if want in a page right click want to disable then we use .first target the body then contextmenu then preventDefoult
    })


    let tableBody=document.querySelector("#tableBody")
    let storeDataintable=()=>{
        let tableRow=''
        userData.forEach((items,index)=>{
            console.log(items);
            tableRow+=`<tr>
                        <td>${index+1}</td>
                        <td>${items.userName}</td>
                        <td>${items.userEmail}</td>
                        <td>${items.userPhone}</td>
                        <td>
                            <button data-id="${index}">Delete</button>
                        </td>
                    </tr>`
        })
        tableBody.innerHTML=tableRow
    }

    tableBody.addEventListener("click",(e)=>{
        if(e.target.tagName=="BUTTON"){
            if(confirm("are you sure want to delete?")){
                let delID = e.target.getAttribute("data-id")
                userData.splice(delID,1)
                storeDataintable()
            }
        }
    })
</script>
</html>
